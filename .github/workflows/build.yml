name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew || true

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Verify Modern API files
        run: |
          test -f app/src/main/resources/META-INF/xposed/java_init.list
          test -f app/src/main/resources/META-INF/xposed/scope.list
          test -f app/src/main/resources/META-INF/xposed/module.prop

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
